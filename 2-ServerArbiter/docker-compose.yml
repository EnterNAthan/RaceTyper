services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: racetyper
      POSTGRES_PASSWORD: racetyper
      POSTGRES_DB: racetyper
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"   # 5433 pour eviter conflit avec PostgreSQL local sur 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racetyper -d racetyper"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Option : lancer le serveur dans Docker (connexion directe à db, évite les soucis host)
  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://racetyper:racetyper@db:5432/racetyper
    ports:
      - "8080:8080"
    command: uvicorn server_app.app:app --host 0.0.0.0 --port 8080
    volumes:
      - .:/app   # Montage pour le dev (rechargement à chaud)

volumes:
  pgdata:

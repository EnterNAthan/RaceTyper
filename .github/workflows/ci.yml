name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-arbitre:
    name: Server Arbitre - Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 2-ServerArbiter

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: racetyper
          POSTGRES_PASSWORD: racetyper
          POSTGRES_DB: racetyper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U racetyper"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://racetyper:racetyper@localhost:5432/racetyper

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: 2-ServerArbiter/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: python -m py_compile server_app/app.py server_app/GameManager.py server_app/ObjectManager.py server_app/logger.py server_app/database.py server_app/models_db.py

      - name: Run tests
        run: python -m pytest tests/ -v

  console-frontend:
    name: Console Raspberry - TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-ConsoleRasberry/typing-game-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 1-ConsoleRasberry/typing-game-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build (vite)
        run: npm run build

  gpio-service:
    name: GPIO Service - Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-ConsoleRasberry/gpio-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: 1-ConsoleRasberry/gpio-service/requirements.txt

      - name: Install dependencies (sans RPi.GPIO)
        run: pip install fastapi "uvicorn[standard]"

      - name: Check syntax
        run: python -m py_compile main.py
name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Serveur Arbitre (Python / FastAPI)
  # ──────────────────────────────────────────────
  server-arbitre:
    name: Server Arbitre - Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 2-ServerArbiter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: 2-ServerArbiter/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: python -m py_compile server_app/app.py server_app/GameManager.py server_app/ObjectManager.py server_app/logger.py

      - name: Run tests
        run: python -m pytest tests/ -v

  # ──────────────────────────────────────────────
  # Console Raspberry - Frontend TypeScript
  # ──────────────────────────────────────────────
  console-frontend:
    name: Console Raspberry - TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-ConsoleRasberry/typing-game-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 1-ConsoleRasberry/typing-game-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build (vite)
        run: npm run build

  # ──────────────────────────────────────────────
  # GPIO Service (Python / FastAPI)
  # ──────────────────────────────────────────────
  gpio-service:
    name: GPIO Service - Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-ConsoleRasberry/gpio-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: 1-ConsoleRasberry/gpio-service/requirements.txt

      - name: Install dependencies (sans RPi.GPIO)
        run: pip install fastapi "uvicorn[standard]"

      - name: Check syntax
        run: python -m py_compile main.py
